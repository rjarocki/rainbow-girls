<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚽ The Rainbow Girls</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --green:#1a7a3c; --lime:#7ec845; --dark:#ffffff; --card:#f5f5f5;
  --card2:#ebebeb; --line:#dddddd; --text:#1a1a1a; --muted:#666666;
  --gold:#f0c040; --red:#e04040; --blue:#4a9fe0; --orange:#e08a30;
  --purple:#a070e0; --swap-sel:#ff6600;
}
html { scroll-behavior:smooth; }
body { background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding-bottom:60px; -webkit-tap-highlight-color:transparent; }

/* HEADER */
header { background:linear-gradient(180deg,#4fc3f7 0%,#81d4fa 40%,#b3e5fc 100%); border-bottom:3px solid transparent; border-image:linear-gradient(90deg,#ff4e4e,#ff9a00,#ffe600,#4cce4c,#3ab5e6,#a64dd4) 1; padding:20px 20px 16px; text-align:center; position:sticky; top:0; z-index:100; overflow:hidden; }
header::before { content:''; position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse 60px 30px at 10% 30%,rgba(255,255,255,.9) 0%,transparent 70%),radial-gradient(ellipse 40px 22px at 7% 38%,rgba(255,255,255,.85) 0%,transparent 70%),radial-gradient(ellipse 80px 35px at 75% 20%,rgba(255,255,255,.9) 0%,transparent 70%),radial-gradient(ellipse 55px 25px at 70% 30%,rgba(255,255,255,.85) 0%,transparent 70%),radial-gradient(ellipse 50px 25px at 45% 65%,rgba(255,255,255,.7) 0%,transparent 70%); }
header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,7vw,3.4rem); letter-spacing:.06em; background:linear-gradient(90deg,#cc0000,#cc2288,#9900cc,#6600cc,#440099); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 1px 3px rgba(0,0,0,.3)); position:relative; }
.header-sub { font-size:.72rem; color:#cc0000; letter-spacing:.14em; text-transform:uppercase; margin-top:2px; position:relative; font-weight:600; }

/* SCREENS */
.screen { display:none; } .screen.active { display:block; }

/* ATTENDANCE */
#screen-attendance { padding:16px; max-width:100%; }
.att-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.06em; color:var(--green); margin-bottom:4px; }
.att-subtitle { font-size:.78rem; color:var(--muted); margin-bottom:12px; }

/* Date field */
.date-row { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin-bottom:14px; }
.date-label { font-size:.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; flex-shrink:0; }
.date-input { flex:1; border:none; background:transparent; font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:600; color:var(--text); outline:none; cursor:pointer; }
.date-input::-webkit-calendar-picker-indicator { cursor:pointer; opacity:.6; }

.att-count-bar { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.att-count-num { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--green); line-height:1; }
.att-count-label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
.att-count-right { text-align:right; }
.bench-preview { font-size:.75rem; color:var(--muted); }
.bench-preview span { color:var(--green); font-weight:600; }
.att-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:20px; }
.att-player { background:var(--card); border:2px solid var(--line); border-radius:12px; padding:10px 10px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:all .15s; user-select:none; -webkit-user-select:none; }
.att-player:active { transform:scale(.97); }
.att-player.present { border-color:var(--green); background:rgba(26,122,60,.06); }
.att-player.absent  { border-color:var(--red); background:rgba(224,64,64,.05); opacity:.6; }
.att-avatar { width:30px; height:30px; border-radius:50%; background:var(--card2); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; color:var(--muted); flex-shrink:0; transition:all .15s; }
.att-player.present .att-avatar { border-color:var(--green); color:var(--green); background:rgba(26,122,60,.08); }
.att-player.absent  .att-avatar { border-color:var(--red); color:var(--red); }
.att-info { flex:1; min-width:0; }
.att-name { font-size:.82rem; font-weight:600; line-height:1.2; word-break:break-word; }
.att-role { display:none; }
.att-player.present .att-role { color:rgba(26,122,60,.7); }
.att-check { font-size:1rem; flex-shrink:0; }
.att-all-btns { display:flex; gap:8px; margin-bottom:16px; }
.att-btn-sm { flex:1; background:var(--card); border:1px solid var(--line); color:var(--muted); padding:8px; border-radius:8px; font-size:.75rem; font-family:'DM Sans',sans-serif; cursor:pointer; text-transform:uppercase; letter-spacing:.06em; transition:all .15s; }
.att-btn-sm:hover { border-color:var(--green); color:var(--green); }
.start-btn { width:100%; background:linear-gradient(135deg,var(--green),#2a8a4a); border:none; color:white; padding:16px; border-radius:12px; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:.1em; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px rgba(26,122,60,.4); }
.start-btn:hover { transform:translateY(-1px); }
.start-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.start-btn-sub { text-align:center; font-size:.72rem; color:var(--muted); margin-top:8px; }

/* TABS */
.quarter-tabs { display:flex; border-bottom:2px solid var(--line); background:#f0f0f0; position:sticky; top:73px; z-index:90; overflow-x:auto; scrollbar-width:none; }
.quarter-tabs::-webkit-scrollbar { display:none; }
.qtab { flex:1; min-width:55px; padding:10px 4px; text-align:center; cursor:pointer; border-bottom:3px solid transparent; transition:all .15s; user-select:none; }
.qtab-num { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:var(--muted); line-height:1; }
.qtab-label { font-size:.55rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-top:1px; }
.qtab.active { border-bottom-color:var(--green); }
.qtab.active .qtab-num, .qtab.active .qtab-label { color:var(--green); }
.qtab-done-dot { width:6px; height:6px; background:var(--green); border-radius:50%; margin:3px auto 0; display:none; }
.qtab.completed .qtab-done-dot { display:block; }
.quarter-panel { display:none; padding:14px 14px 0; }
.quarter-panel.active { display:block; }

/* GOALIE CARD */
.goalie-card { background:linear-gradient(135deg,rgba(240,192,64,.15),rgba(240,192,64,.05)); border:1px solid rgba(240,192,64,.4); border-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.goalie-icon { font-size:1.3rem; }
.goalie-info { flex:1; }
.goalie-name { font-size:.95rem; font-weight:600; color:#b8860b; }
.goalie-sub  { font-size:.68rem; color:rgba(184,134,11,.7); text-transform:uppercase; letter-spacing:.08em; }
.full-q-badge { font-size:.62rem; font-weight:700; background:rgba(240,192,64,.2); color:#b8860b; border:1px solid rgba(240,192,64,.4); padding:3px 8px; border-radius:999px; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }

/* QUARTER DONE BAR */
.quarter-done-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 14px; background:rgba(26,122,60,.04); border:1px solid rgba(26,122,60,.15); border-radius:10px; margin-bottom:12px; }
.quarter-done-label { font-size:.72rem; color:var(--muted); }
.quarter-done-btn { font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:6px 14px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; }
.quarter-done-btn.done { background:rgba(26,122,60,.1); border-color:var(--green); color:var(--green); }

/* HALF SECTION */
.half-section { background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:10px; transition:opacity .2s; }
.half-section.completed { opacity:.5; }
.half-header { background:rgba(26,122,60,.05); border-bottom:1px solid var(--line); padding:7px 12px; display:flex; align-items:center; justify-content:space-between; gap:6px; }
.half-title { font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--green); flex:1; }
.swap-mode-btn { font-size:.63rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
.swap-mode-btn.active { background:rgba(255,102,0,.1); border-color:var(--swap-sel); color:var(--swap-sel); }

/* SWAP BANNER */
.swap-banner { display:none; background:rgba(255,102,0,.08); border:1px solid rgba(255,102,0,.3); border-radius:8px; margin:0 0 8px; padding:8px 12px; font-size:.76rem; color:var(--swap-sel); align-items:center; justify-content:space-between; gap:8px; }
.swap-banner.visible { display:flex; }
.swap-cancel-btn { font-size:.65rem; font-weight:700; padding:3px 9px; border-radius:999px; border:1px solid var(--swap-sel); background:transparent; color:var(--swap-sel); cursor:pointer; }

/* NOTICE */
.no-bench-notice { background:rgba(240,192,64,.07); border:1px solid rgba(240,192,64,.2); border-radius:8px; padding:9px 12px; font-size:.78rem; color:#b8860b; margin-bottom:10px; display:flex; align-items:center; gap:8px; }

/* POS LABEL */
.pos-label { padding:4px 12px 3px; font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); background:rgba(0,0,0,.03); border-bottom:1px solid rgba(0,0,0,.05); border-top:1px solid rgba(0,0,0,.05); }

/* PLAYER ROW */
.player-row { display:flex; align-items:center; padding:7px 12px; gap:9px; font-size:.82rem; border-bottom:1px solid rgba(0,0,0,.05); transition:background .12s; }
.player-row:last-child { border-bottom:none; }
.player-row.fwd { color:var(--orange); }
.player-row.def { color:var(--blue); }
.player-row.sub { color:var(--purple); font-weight:600; }
.player-row.out { color:var(--red); opacity:.7; }
.player-row.swappable { cursor:pointer; }
.player-row.swappable:active { background:rgba(255,102,0,.05); }
.player-row.swap-selected { background:rgba(255,102,0,.12) !important; outline:2px solid var(--swap-sel); outline-offset:-2px; border-radius:4px; }
.player-name { flex:1; }
.pos-badge { font-size:.6rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; padding:2px 6px; border-radius:999px; flex-shrink:0; white-space:nowrap; }
.pb-fwd { background:rgba(224,138,48,.15); color:var(--orange); border:1px solid rgba(224,138,48,.3); }
.pb-def { background:rgba(74,159,224,.12); color:var(--blue); border:1px solid rgba(74,159,224,.25); }
.pb-sub { background:rgba(160,112,224,.15); color:var(--purple); border:1px solid rgba(160,112,224,.3); }
.pb-out { background:rgba(224,64,64,.1); color:var(--red); border:1px solid rgba(224,64,64,.25); }
.pb-gk  { background:rgba(240,192,64,.2); color:#b8860b; border:1px solid rgba(240,192,64,.4); }

/* SUB PANEL */
.sub-panel { margin:0 10px 10px; border-radius:10px; background:rgba(160,112,224,.07); border:1px solid rgba(160,112,224,.2); overflow:hidden; }
.sub-panel-title { padding:6px 12px 4px; font-size:.6rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--purple); border-bottom:1px solid rgba(160,112,224,.15); background:rgba(160,112,224,.05); }
.sub-swap { display:flex; align-items:center; padding:7px 12px; gap:8px; border-bottom:1px solid rgba(160,112,224,.08); font-size:.8rem; cursor:pointer; transition:background .12s; }
.sub-swap:last-child { border-bottom:none; }
.sub-swap:active { background:rgba(160,112,224,.1); }
.sub-swap.swap-done { opacity:.4; text-decoration:line-through; }
.swap-check { width:18px; height:18px; flex-shrink:0; border-radius:50%; border:2px solid rgba(160,112,224,.4); background:transparent; position:relative; transition:all .15s; }
.sub-swap.swap-done .swap-check { background:var(--purple); border-color:var(--purple); }
.sub-swap.swap-done .swap-check::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700; color:white; }
.swap-in { color:var(--purple); font-weight:600; flex:1; }
.swap-arrow { color:var(--green); }
.swap-out { color:var(--muted); flex:1; text-align:right; }
.no-sub-notice { margin:0 10px 10px; border-radius:10px; background:rgba(26,122,60,.05); border:1px solid rgba(26,122,60,.15); padding:8px 12px; font-size:.75rem; color:var(--muted); }

/* PROGRESS */
.progress-wrap { padding:0 14px 14px; }
.progress-label { display:flex; justify-content:space-between; font-size:.68rem; color:var(--muted); margin-bottom:5px; }
.progress-bar { height:4px; background:var(--line); border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--green),var(--lime)); border-radius:999px; transition:width .3s ease; width:0%; }
.reset-wrap { text-align:center; padding:10px 14px 4px; }
.reset-btn { background:transparent; border:1px solid var(--line); color:var(--muted); padding:7px 18px; border-radius:999px; font-size:.72rem; font-family:'DM Sans',sans-serif; cursor:pointer; letter-spacing:.06em; text-transform:uppercase; transition:all .15s; }
.reset-btn:hover { border-color:var(--red); color:var(--red); }
.edit-att-wrap { padding:16px 14px 4px; text-align:center; }
.edit-att-btn { background:transparent; border:1px solid var(--line); color:var(--muted); padding:8px 18px; border-radius:999px; font-size:.72rem; font-family:'DM Sans',sans-serif; cursor:pointer; letter-spacing:.06em; text-transform:uppercase; transition:all .15s; }
.edit-att-btn:hover { border-color:var(--green); color:var(--green); }

/* SUMMARY */
.summary-section { padding:14px; }
.summary-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.06em; color:var(--green); margin-bottom:10px; }
.summary-tabs { display:flex; gap:8px; margin-bottom:14px; }
.sum-tab { flex:1; padding:8px; border-radius:8px; border:1px solid var(--line); background:var(--card); font-size:.72rem; font-weight:600; text-align:center; cursor:pointer; color:var(--muted); transition:all .15s; }
.sum-tab.active { background:var(--green); color:white; border-color:var(--green); }
.save-game-btn { width:100%; background:linear-gradient(135deg,var(--green),#2a8a4a); border:none; color:white; padding:12px; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:.1em; cursor:pointer; margin-bottom:14px; transition:all .2s; }
.save-game-btn:hover { opacity:.9; }
.clear-history-btn { width:100%; background:transparent; border:1px solid var(--line); color:var(--muted); padding:8px; border-radius:8px; font-size:.72rem; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:8px; transition:all .15s; }
.clear-history-btn:hover { border-color:var(--red); color:var(--red); }

/* PLAYER STAT CARD */
.psc { background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:8px; }
.psc-header { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--line); background:rgba(0,0,0,.02); }
.psc-name { font-size:.85rem; font-weight:600; flex:1; color:var(--text); }
.psc-badge { font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:999px; }
.psc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); }
.psc-stat { background:var(--dark); padding:7px 4px; text-align:center; }
.psc-stat-num { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; line-height:1; }
.psc-stat-label { font-size:.56rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-top:2px; }
.stat-gk  { color:#b8860b; }
.stat-fwd { color:var(--orange); }
.stat-def { color:var(--blue); }
.stat-out { color:var(--red); }
.psc-segs { display:flex; gap:3px; padding:7px 12px; flex-wrap:wrap; }
.seg { width:28px; height:22px; border-radius:5px; font-size:.6rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.seg span { font-size:.48rem; color:var(--muted); margin-top:1px; }
.seg-fwd { background:rgba(224,138,48,.15); color:var(--orange); }
.seg-def { background:rgba(74,159,224,.12); color:var(--blue); }
.seg-gk  { background:rgba(240,192,64,.2); color:#b8860b; }
.seg-sit { background:rgba(224,64,64,.1); color:var(--red); }
.seg-bench { background:rgba(160,112,224,.12); color:var(--purple); }
.seg-abs { background:rgba(100,100,100,.08); color:#aaa; }

/* GAME HISTORY */
.game-hist-item { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 14px; margin-bottom:8px; }
.game-hist-date { font-size:.8rem; font-weight:600; color:var(--text); margin-bottom:2px; }
.game-hist-players { font-size:.74rem; color:var(--muted); }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a1a1a; border:1px solid var(--green); color:var(--lime); padding:9px 18px; border-radius:999px; font-size:.78rem; font-weight:600; letter-spacing:.06em; z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1><span style="-webkit-text-fill-color:initial">🌈</span> The Rainbow Girls</h1>
  <div class="header-sub" id="header-sub-static">Game Day Rotation</div>
  <div class="header-sub" id="header-sub" style="margin-top:2px">Mark attendance to begin</div>
</header>

<!-- ATTENDANCE SCREEN -->
<div class="screen active" id="screen-attendance">
  <div style="padding:14px 14px 0">
    <div class="att-title">Who's Here Today?</div>
    <div class="att-subtitle">Set the game date and mark who's present</div>

    <div class="date-row">
      <div class="date-label">📅 Game Date</div>
      <input type="date" class="date-input" id="game-date">
    </div>

    <div class="att-count-bar">
      <div>
        <div class="att-count-num" id="att-count">10</div>
        <div class="att-count-label">Present</div>
      </div>
      <div class="att-count-right">
        <div class="bench-preview" id="bench-preview">3 on bench per quarter</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:3px" id="att-warning"></div>
      </div>
    </div>
    <div class="att-all-btns">
      <button class="att-btn-sm" onclick="setAllAttendance(true)">✓ All Present</button>
      <button class="att-btn-sm" onclick="setAllAttendance(false)">✗ All Absent</button>
    </div>
    <div class="att-grid" id="att-grid"></div>
    <button class="start-btn" id="start-btn" onclick="startGame()">Generate Rotation ▶</button>
    <div class="start-btn-sub" id="start-btn-sub">10 girls · 3 bench per quarter</div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <div class="quarter-tabs" id="quarter-tabs"></div>
  <div id="quarter-panels"></div>
  <div class="edit-att-wrap">
    <button class="edit-att-btn" onclick="editAttendance()">← Edit Attendance / Date</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  PLAYERS
// ═══════════════════════════════════════════
const PLAYERS = [
  { id:'lyla-kay', name:'Lyla Kay',             firstName:'Lyla',     initials:'LK', goalieOrder:1,  prevGoalie:false },
  { id:'kalliopi', name:'Kalliopi Diamantakis', firstName:'Kalliopi', initials:'KD', goalieOrder:2,  prevGoalie:false },
  { id:'riley',    name:'Riley Meditz',         firstName:'Riley',    initials:'RM', goalieOrder:3,  prevGoalie:false },
  { id:'skylar',   name:'Skylar McFadzen',      firstName:'Skylar',   initials:'SM', goalieOrder:4,  prevGoalie:false },
  { id:'mackayla', name:'Mackayla Dellaposta',  firstName:'Mackayla', initials:'MD', goalieOrder:99, prevGoalie:false },
  { id:'bronagh',  name:'Bronagh Lyons',        firstName:'Bronagh',  initials:'BL', goalieOrder:99, prevGoalie:false },
  { id:'penny',    name:'Penny Jarocki',        firstName:'Penny',    initials:'PJ', goalieOrder:99, prevGoalie:true  },
  { id:'lyla-p',   name:'Lyla Pesinkowski',     firstName:'Lyla',     initials:'LP', goalieOrder:99, prevGoalie:true  },
  { id:'olivia',   name:'Olivia Freire',        firstName:'Olivia',   initials:'OF', goalieOrder:99, prevGoalie:true  },
  { id:'giavana',  name:'Giavana Clemente',     firstName:'Giavana',  initials:'GC', goalieOrder:99, prevGoalie:true  },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let attendance = {};
PLAYERS.forEach(p => attendance[p.id] = true);
let gameData = null;
let halfSwapState = {};
// Per-quarter position overrides stored in memory
// quarterState[q] = { h1: {pid: {cls, label, pbcls}}, h2: {...} }
let quarterState = {};

// ═══════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════
function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function formatDate(dateStr) {
  if (!dateStr) return 'Unknown date';
  const [y,m,d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

// ═══════════════════════════════════════════
//  LOCALSTORAGE
// ═══════════════════════════════════════════
const STORAGE_KEY = 'rainbow_girls_v2';
function loadStats() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { games:[] }; }
  catch(e) { return { games:[] }; }
}
function saveStats(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function saveCurrentGame() {
  if (!gameData) return;
  const dateStr = document.getElementById('game-date').value || getTodayStr();
  const stats = loadStats();
  const present = PLAYERS.filter(p => attendance[p.id]);

  // Build stats from gameData quarterState
  const playerStats = {};
  present.forEach(p => playerStats[p.id] = { gk:0, fwd:0, def:0, subs:0 });

  gameData.quarters.forEach(qd => {
    const q = qd.q;
    const qs = quarterState[q] || {};

    // Goalie gets 1 GK for the quarter
    if (playerStats[qd.goalie.id] !== undefined) playerStats[qd.goalie.id].gk++;

    // Get h1 positions — use override if present, else original
    const h1 = getQuarterPositions(qd, 'h1', qs.h1 || {});
    const h2 = getQuarterPositions(qd, 'h2', qs.h2 || {});

    // Merge h1 and h2 — each player gets counted once per quarter for their position
    // If they played both halves in same role, count once. If different, count the 2nd half role.
    const allPids = new Set([...Object.keys(h1), ...Object.keys(h2)]);
    allPids.forEach(pid => {
      if (!playerStats[pid]) return;
      if (pid === qd.goalie.id) return; // already counted as GK
      const r1 = h1[pid];
      const r2 = h2[pid];
      // Determine primary role for this quarter
      let role;
      if ((r1==='bench'||!r1) && (r2==='bench'||!r2)) role='bench';
      else if (r2 && r2!=='bench') role=r2;
      else if (r1 && r1!=='bench') role=r1;
      else role='bench';

      if (role==='fwd') playerStats[pid].fwd++;
      else if (role==='def') playerStats[pid].def++;
      // Count bench time: subbed IN (sat 1st half) OR came OFF (sat 2nd half)
      const qSubInIds  = new Set((qd.subIn   ||[]).map(p=>p.id));
      const qSubOutIds = new Set((qd.comingOff||[]).map(p=>p.id));
      if (qSubInIds.has(pid) || qSubOutIds.has(pid)) playerStats[pid].subs++;
    });
  });

  const record = {
    date: dateStr,
    dateFormatted: formatDate(dateStr),
    timestamp: Date.now(),
    presentIds: present.map(p => p.id),
    players: playerStats
  };

  // Check if a game for this date already exists — replace it
  const idx = stats.games.findIndex(g => g.date === dateStr);
  if (idx >= 0) {
    if (!confirm(`A game for ${formatDate(dateStr)} already exists. Replace it?`)) return;
    stats.games[idx] = record;
  } else {
    stats.games.push(record);
  }
  // Sort by date descending
  stats.games.sort((a,b) => b.date.localeCompare(a.date));
  saveStats(stats);
  showToast(`✓ ${formatDate(dateStr)} saved!`);
}

// Get {pid: role} map for a half, applying overrides
function getQuarterPositions(qd, half, overrides) {
  const result = {};
  const data = half === 'h1' ? qd.half1 : qd.half2;

  data.fwds.forEach(p => result[p.id] = 'fwd');
  data.defs.forEach(p => result[p.id] = 'def');
  if (data.bench) data.bench.forEach(p => result[p.id] = 'bench');
  if (data.off)   data.off.forEach(p => result[p.id] = 'bench');

  // Apply overrides
  Object.entries(overrides).forEach(([pid, role]) => { result[pid] = role; });
  return result;
}

function clearHistory() {
  if (confirm('Clear all season stats? This cannot be undone.')) {
    saveStats({ games:[] });
    renderSummaryTab();
    showToast('Season stats cleared');
  }
}

function updateAttCount() {
  const present = PLAYERS.filter(p => attendance[p.id]).length;
  document.getElementById('att-count').textContent = present;
  const btn = document.getElementById('start-btn');
  const sub = document.getElementById('start-btn-sub');

    bp.innerHTML = `<span style="color:var(--red)">No players marked present</span>`;

    bp.innerHTML = `<span>No bench</span> — all ${present} girls play`;
    sub.textContent = `${present} girls · everyone plays`;

    bp.innerHTML = `<span>${b}</span> on bench per quarter`;
    sub.textContent = `${present} girls · ${b} bench per quarter`;
  }
}

// ═══════════════════════════════════════════
//  ROTATION GENERATOR
// ═══════════════════════════════════════════
function generateRotation(presentPlayers) {
  const n = presentPlayers.length;
  const benchPerQ = Math.max(0, n - 7);
  const FAVORED = ['penny', 'lyla-kay'];

  const goaliePool = [...presentPlayers].sort((a,b) => {
    if (a.goalieOrder !== b.goalieOrder) return a.goalieOrder - b.goalieOrder;
    return (a.prevGoalie?1:0) - (b.prevGoalie?1:0);
  });
  const goalies = [];
  for (let q = 0; q < 4; q++) goalies.push(goaliePool[q % goaliePool.length]);

  let benchCounts = {}, halfOffCounts = {};
  presentPlayers.forEach(p => { benchCounts[p.id]=0; halfOffCounts[p.id]=0; });
  let justCameOff = new Set();
  const quarters = [];

  const sortForBench = arr => [...arr].sort((a,b) => {
    const d = benchCounts[a.id] - benchCounts[b.id];
    if (d !== 0) return d;
    const af = FAVORED.includes(a.id)?1:0, bf = FAVORED.includes(b.id)?1:0;
    if (af !== bf) return af - bf;
    return a.id.localeCompare(b.id);
  });

  for (let q = 0; q < 4; q++) {
    const goalie = goalies[q];
    const available = presentPlayers.filter(p => p.id !== goalie.id);
    const nonRecent = available.filter(p => !justCameOff.has(p.id));
    const recent    = available.filter(p =>  justCameOff.has(p.id));

    let benchThisQ = [];
    if (benchPerQ > 0) {
      const snr = sortForBench(nonRecent);
      benchThisQ = snr.length >= benchPerQ
        ? snr.slice(0, benchPerQ)
        : [...snr, ...sortForBench(recent).slice(0, benchPerQ - snr.length)];
    }
    benchThisQ.forEach(p => benchCounts[p.id]++);

    const fieldThisQ = available.filter(p => !benchThisQ.find(b => b.id === p.id));
    const fc = fieldThisQ.length, fwdCount = Math.min(3, fc);
    const rotated = rotateArray(fieldThisQ, q * Math.floor(fc/2));
    const fwds1st = rotated.slice(0, fwdCount), defs1st = rotated.slice(fwdCount);

    const offCands = [...rotated].sort((a,b) => {
      const d = halfOffCounts[a.id] - halfOffCounts[b.id];
      if (d !== 0) return d;
      const af = FAVORED.includes(a.id)?1:0, bf = FAVORED.includes(b.id)?1:0;
      if (af !== bf) return af - bf;
      return a.id.localeCompare(b.id);
    });
    const comingOff = offCands.slice(0, benchPerQ);
    comingOff.forEach(p => halfOffCounts[p.id]++);
    justCameOff = new Set(comingOff.map(p => p.id));

    const staying = rotated.filter(p => !comingOff.find(c => c.id === p.id));
    const field2nd = [...staying, ...benchThisQ];
    const rotated2nd = rotateArray(field2nd, q);
    const fwds2nd = rotated2nd.slice(0, fwdCount), defs2nd = rotated2nd.slice(fwdCount);

    quarters.push({
      q: q+1, goalie, bench:benchThisQ, comingOff, subIn:benchThisQ,
      half1:{ fwds:fwds1st, defs:defs1st, bench:benchThisQ },
      half2:{ fwds:fwds2nd, defs:defs2nd, off:comingOff },
      hasBench: benchPerQ > 0,
    });
  }
  return { quarters, benchPerQ, n };
}

function rotateArray(arr, n) {
  if (!arr.length) return arr;
  const o = ((n % arr.length) + arr.length) % arr.length;
  return [...arr.slice(o), ...arr.slice(0, o)];
}

// ═══════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════
function startGame() {
  const present = PLAYERS.filter(p => attendance[p.id]);
  if (present.length < 1) return;
  halfSwapState = {};
  quarterState = {};
  gameData = generateRotation(present);
  const dateStr = document.getElementById('game-date').value || getTodayStr();
  document.getElementById('screen-attendance').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('header-sub').textContent = `${formatDate(dateStr)} · ${present.length} players`;
  renderGameScreen();
}

//  RENDER GAME SCREEN
// ═══════════════════════════════════════════
function renderGameScreen() {
  const tabsEl = document.getElementById('quarter-tabs');
  const panelsEl = document.getElementById('quarter-panels');
  tabsEl.innerHTML = ''; panelsEl.innerHTML = '';

  gameData.quarters.forEach((qd, idx) => {
    const tab = document.createElement('div');
    tab.className = `qtab${idx===0?' active':''}`;
    tab.innerHTML = `<div class="qtab-num">Q${qd.q}</div><div class="qtab-label">Qtr ${qd.q}</div><div class="qtab-done-dot"></div>`;
    tab.onclick = () => switchTab(idx);
    tabsEl.appendChild(tab);
  });
  const st = document.createElement('div');
  st.className = 'qtab';
  st.innerHTML = `<div class="qtab-num" style="font-size:.85rem;padding-top:6px">📊</div><div class="qtab-label">Stats</div><div class="qtab-done-dot"></div>`;
  st.onclick = () => { switchTab(4); renderSummaryTab(); };
  tabsEl.appendChild(st);

  gameData.quarters.forEach((qd, idx) => {
    const panel = document.createElement('div');
    panel.className = `quarter-panel${idx===0?' active':''}`;
    panel.id = `panel-${idx}`;
    panel.innerHTML = buildQuarterHTML(qd, idx);
    panelsEl.appendChild(panel);
  });

  const sumPanel = document.createElement('div');
  sumPanel.className = 'quarter-panel';
  sumPanel.id = 'panel-4';
  sumPanel.innerHTML = `<div class="summary-section" id="summary-content"></div>`;
  panelsEl.appendChild(sumPanel);
}

function buildQuarterHTML(qd, idx) {
  const qn = qd.q;
  const goalieStar = !qd.goalie.prevGoalie ? ' ⭐' : '';
  let html = ``;

  // Goalie card
  html += `<div class="goalie-card">
    <div class="goalie-icon">🧤</div>
    <div class="goalie-info">
      <div class="goalie-name">${qd.goalie.name}</div>
      <div class="goalie-sub">Goalkeeper${goalieStar}</div>
    </div>
    <span class="full-q-badge">Full Q</span>
  </div>`;

  // Quarter-level done button
  html += `<div class="quarter-done-bar">
    <div class="quarter-done-label">Mark entire quarter complete</div>
    <button class="quarter-done-btn" id="qdone-${qn}" onclick="markQuarterDone(${qn}, ${idx}, this)">✓ Q${qn} Done</button>
  </div>`;

  if (!qd.hasBench) {
    const msg = gameData.n < 7 ? `${gameData.n} players — all on field` : `Everyone plays — no subs!`;
    html += `<div class="no-bench-notice">⚡ ${msg}</div>`;
    html += buildHalfHTML(qd, 'full', qd.half1.fwds, qd.half1.defs, [], [], qn, false);
    html += `<div class="no-sub-notice">✓ No substitutions this quarter</div>`;
  } else {
    html += buildHalfHTML(qd, 'h1', qd.half1.fwds, qd.half1.defs, qd.half1.bench, [], qn, true);
    html += `<div class="sub-panel"><div class="sub-panel-title">⟳ Half-Time Subs — tap each to confirm</div>`;
    qd.comingOff.forEach((off, i) => {
      const inP = qd.subIn[i];
      html += `<div class="sub-swap" onclick="toggleSwap(this,${qn})">
        <div class="swap-check"></div>
        <span class="swap-in">↑ ${inP.name}</span>
        <span class="swap-arrow">⇄</span>
        <span class="swap-out">${off.name} ↓</span>
      </div>`;
    });
    html += `</div>`;
    html += buildHalfHTML(qd, 'h2', qd.half2.fwds, qd.half2.defs, [], qd.half2.off, qn, true);
  }

  html += `<div class="progress-wrap">
    <div class="progress-label"><span>Q${qn} Subs</span><span id="q${qn}-prog-text">0 confirmed</span></div>
    <div class="progress-bar"><div class="progress-fill" id="q${qn}-prog-fill"></div></div>
  </div>
  <div class="reset-wrap"><button class="reset-btn" onclick="resetPanel('panel-${idx}',${qn})">Reset Q${qn}</button></div>`;
  return html;
}

function buildHalfHTML(qd, halfSuffix, fwds, defs, bench, off, qn, showSwap) {
  const halfId = `q${qn}-${halfSuffix}`;
  const label = halfSuffix==='full' ? 'Full Quarter' : halfSuffix==='h1' ? '1st Half' : '2nd Half';
  const subbedInIds = new Set(qd.subIn ? qd.subIn.map(p=>p.id) : []);

  let html = `<div class="half-section" id="${halfId}">
    <div class="half-header">
      <div class="half-title">▶ ${label}</div>`;
  if (showSwap) {
    html += `<button class="swap-mode-btn" id="swapbtn-${halfId}" onclick="toggleSwapMode('${halfId}',${qn},'${halfSuffix}')">⇄ Override</button>`;
  }
  html += `</div>
    <div class="swap-banner" id="swapbanner-${halfId}">
      <span id="swaplabel-${halfId}">Tap a player to select, then tap another to swap</span>
      <button class="swap-cancel-btn" onclick="cancelSwapMode('${halfId}')">Cancel</button>
    </div>`;

  if (fwds.length > 0) {
    html += `<div class="pos-label">⚡ Forwards</div>`;
    fwds.forEach(p => {
      const isSub = subbedInIds.has(p.id) && halfSuffix==='h2';
      html += playerRowHTML(p, isSub?'sub':'fwd', isSub?'Sub In':'Fwd', halfId, qn, halfSuffix);
    });
  }
  if (defs.length > 0) {
    html += `<div class="pos-label">🛡 Defense</div>`;
    defs.forEach(p => {
      const isSub = subbedInIds.has(p.id) && halfSuffix==='h2';
      html += playerRowHTML(p, isSub?'sub':'def', isSub?'Sub In':'Def', halfId, qn, halfSuffix);
    });
  }
  if (bench.length > 0) {
    html += `<div class="pos-label">🪑 Bench</div>`;
    bench.forEach(p => html += playerRowHTML(p, 'out', 'Bench', halfId, qn, halfSuffix));
  }
  if (off.length > 0) {
    html += `<div class="pos-label">🪑 Came Off</div>`;
    off.forEach(p => html += playerRowHTML(p, 'out', 'Off', halfId, qn, halfSuffix));
  }
  html += `</div>`;
  return html;
}

function playerRowHTML(p, cls, label, halfId, qn, halfKey) {
  const pbCls = {fwd:'pb-fwd',def:'pb-def',sub:'pb-sub',out:'pb-out'}[cls]||'pb-out';
  const role = cls==='sub'?'fwd':cls;
  return `<div class="player-row ${cls}" data-pid="${p.id}" data-role="${role}" data-halfid="${halfId}" data-qn="${qn}" data-halfkey="${halfKey}" onclick="handlePlayerRowClick(this)">
    <span class="player-name">${p.name}</span>
    <span class="pos-badge ${pbCls}" id="badge-${halfId}-${p.id}">${label}</span>
  </div>`;
}

// ═══════════════════════════════════════════
//  SWAP MODE
// ═══════════════════════════════════════════
function toggleSwapMode(halfId, qn, halfKey) {
  if (halfSwapState[halfId]?.active) { cancelSwapMode(halfId); return; }
  halfSwapState[halfId] = { active:true, selectedRow:null };
  document.getElementById(`swapbtn-${halfId}`).classList.add('active');
  document.getElementById(`swapbanner-${halfId}`).classList.add('visible');
  document.getElementById(halfId).querySelectorAll('.player-row').forEach(r => r.classList.add('swappable'));
  showToast('Tap two players to swap positions');
}

function cancelSwapMode(halfId) {
  halfSwapState[halfId] = { active:false, selectedRow:null };
  document.getElementById(`swapbtn-${halfId}`)?.classList.remove('active');
  document.getElementById(`swapbanner-${halfId}`)?.classList.remove('visible');
  document.getElementById(halfId)?.querySelectorAll('.player-row').forEach(r => r.classList.remove('swappable','swap-selected'));
}

function handlePlayerRowClick(row) {
  const halfId = row.dataset.halfid;
  const state = halfSwapState[halfId];
  if (!state?.active) return;
  if (!state.selectedRow) {
    state.selectedRow = row;
    row.classList.add('swap-selected');
    document.getElementById(`swaplabel-${halfId}`).textContent = `${row.querySelector('.player-name').textContent} selected — tap another to swap`;
  } else if (state.selectedRow === row) {
    row.classList.remove('swap-selected');
    state.selectedRow = null;
    document.getElementById(`swaplabel-${halfId}`).textContent = 'Tap a player to select, then tap another to swap';
  } else {
    performSwap(halfId, state.selectedRow, row);
    cancelSwapMode(halfId);
  }
}

function performSwap(halfId, rowA, rowB) {
  const clsA = [...rowA.classList].find(c=>['fwd','def','sub','out'].includes(c));
  const clsB = [...rowB.classList].find(c=>['fwd','def','sub','out'].includes(c));
  const pidA = rowA.dataset.pid, pidB = rowB.dataset.pid;
  const badgeA = document.getElementById(`badge-${halfId}-${pidA}`);
  const badgeB = document.getElementById(`badge-${halfId}-${pidB}`);
  const labelA = badgeA.textContent, labelB = badgeB.textContent;
  const pbA = [...badgeA.classList].find(c=>c.startsWith('pb-'));
  const pbB = [...badgeB.classList].find(c=>c.startsWith('pb-'));
  const roleA = rowA.dataset.role, roleB = rowB.dataset.role;

  rowA.classList.remove(clsA); rowA.classList.add(clsB);
  rowB.classList.remove(clsB); rowB.classList.add(clsA);
  badgeA.textContent = labelB; badgeA.classList.remove(pbA); badgeA.classList.add(pbB);
  badgeB.textContent = labelA; badgeB.classList.remove(pbB); badgeB.classList.add(pbA);
  rowA.dataset.role = roleB; rowB.dataset.role = roleA;

  // Store override in quarterState
  const qn = parseInt(rowA.dataset.qn);
  const hk = rowA.dataset.halfkey;
  if (!quarterState[qn]) quarterState[qn] = {};
  if (!quarterState[qn][hk]) quarterState[qn][hk] = {};
  quarterState[qn][hk][pidA] = roleB;
  quarterState[qn][hk][pidB] = roleA;

  showToast(`⇄ ${rowA.querySelector('.player-name').textContent} ↔ ${rowB.querySelector('.player-name').textContent}`);
}

// ═══════════════════════════════════════════
//  QUARTER DONE
// ═══════════════════════════════════════════
function markQuarterDone(qn, idx, btn) {
  const panel = document.getElementById(`panel-${idx}`);
  const isDone = !btn.classList.contains('done');
  btn.classList.toggle('done', isDone);
  btn.textContent = isDone ? `✓ Q${qn} Complete!` : `✓ Q${qn} Done`;
  // Fade halves
  panel.querySelectorAll('.half-section').forEach(h => h.classList.toggle('completed', isDone));
  const tabEl = document.querySelectorAll('.qtab')[idx];
  tabEl.classList.toggle('completed', isDone);
  if (isDone) showToast(`🎉 Q${qn} complete!`);
}

// ═══════════════════════════════════════════
//  SUMMARY
// ═══════════════════════════════════════════
let summaryView = 'game';
function renderSummaryTab() {
  const el = document.getElementById('summary-content');
  if (!el) return;
  el.innerHTML = `<div class="summary-section">
    <div class="summary-title">Player Stats</div>
    <div class="summary-tabs">
      <div class="sum-tab ${summaryView==='game'?'active':''}" onclick="setSummaryView('game')">This Game</div>
      <div class="sum-tab ${summaryView==='season'?'active':''}" onclick="setSummaryView('season')">Season Total</div>
    </div>
    ${summaryView==='game' ? buildGameSummary() : buildSeasonSummary()}
  </div>`;
}

function setSummaryView(v) { summaryView=v; renderSummaryTab(); }

function buildGameSummary() {
  if (!gameData) return '<p style="color:var(--muted);font-size:.82rem">Start a game to see stats.</p>';
  const present = PLAYERS.filter(p => attendance[p.id]);
  const absent  = PLAYERS.filter(p => !attendance[p.id]);
  const dateStr = document.getElementById('game-date').value || getTodayStr();

  // Build per-half segment map (8 slots: Q1a, Q1b, Q2a, Q2b, Q3a, Q3b, Q4a, Q4b)
  // Each slot independently shows the player's actual role for that half
  const playerTotals = {};
  present.forEach(p => playerTotals[p.id] = {gk:0,fwd:0,def:0,subs:0});

  // segMap: 8 entries per player — index 0=Q1a,1=Q1b,2=Q2a,3=Q2b,4=Q3a,5=Q3b,6=Q4a,7=Q4b
  const segMap = {};
  present.forEach(p => segMap[p.id] = Array(8).fill('?'));
  const segLabels = ['Q1a','Q1b','Q2a','Q2b','Q3a','Q3b','Q4a','Q4b'];

  gameData.quarters.forEach(qd => {
    const qi = qd.q - 1;
    const ia = qi * 2;     // 1st half index
    const ib = qi * 2 + 1; // 2nd half index
    const qs = quarterState[qd.q] || {};
    const overH1 = qs.h1 || {}, overH2 = qs.h2 || {};

    // Goalie — full quarter
    if (playerTotals[qd.goalie.id] !== undefined) {
      playerTotals[qd.goalie.id].gk++;
      segMap[qd.goalie.id][ia] = 'gk';
      segMap[qd.goalie.id][ib] = 'gk';
    }

    // Build per-half role maps
    const h1map = {}, h2map = {};
    qd.half1.fwds.forEach(p  => h1map[p.id] = overH1[p.id] || 'fwd');
    qd.half1.defs.forEach(p  => h1map[p.id] = overH1[p.id] || 'def');
    if (qd.half1.bench) qd.half1.bench.forEach(p => h1map[p.id] = overH1[p.id] || 'bench');
    qd.half2.fwds.forEach(p  => h2map[p.id] = overH2[p.id] || 'fwd');
    qd.half2.defs.forEach(p  => h2map[p.id] = overH2[p.id] || 'def');
    if (qd.half2.off) qd.half2.off.forEach(p => h2map[p.id] = overH2[p.id] || 'bench');

    const subInIds  = new Set((qd.subIn    ||[]).map(p=>p.id));
    const subOutIds = new Set((qd.comingOff||[]).map(p=>p.id));

    present.forEach(p => {
      if (p.id === qd.goalie.id) return;
      if (!playerTotals[p.id]) return;

      const r1 = h1map[p.id] || 'bench';
      const r2 = h2map[p.id] || 'bench';

      // Map each half independently to its segment type
      const toSeg = (r, isSub) => {
        if (isSub) return 'bench'; // on bench this half
        if (r === 'fwd') return 'fwd';
        if (r === 'def') return 'def';
        return 'bench'; // sat out
      };

      const seg1 = toSeg(r1, subInIds.has(p.id));   // benched 1st half → sub in
      const seg2 = toSeg(r2, subOutIds.has(p.id));  // benched 2nd half → sub out

      segMap[p.id][ia] = seg1;
      segMap[p.id][ib] = seg2;

      // Totals: count playing positions from the half they actually played
      // fwd/def counted from whichever half they were on field
      if (r1==='fwd' && !subInIds.has(p.id))  playerTotals[p.id].fwd++;
      if (r1==='def' && !subInIds.has(p.id))  playerTotals[p.id].def++;
      if (r2==='fwd' && !subOutIds.has(p.id)) playerTotals[p.id].fwd++;
      if (r2==='def' && !subOutIds.has(p.id)) playerTotals[p.id].def++;
      // Subs: each bench half counts as one sub involvement
      if (subInIds.has(p.id))  playerTotals[p.id].subs++;
      if (subOutIds.has(p.id)) playerTotals[p.id].subs++;
    });
  });

  const segCls = {gk:'seg-gk',fwd:'seg-fwd',def:'seg-def',bench:'seg-bench','?':'seg-abs'};
  const segTxt = {gk:'GK',fwd:'FW',def:'DF',bench:'SB','?':'?'};

  let html = `<button class="save-game-btn" onclick="saveCurrentGame()">💾 Save Game — ${formatDate(dateStr)}</button>`;

  // Sort present players alphabetically by last name, then first name
  const sortedPresent = [...present].sort((a,b) => a.firstName.localeCompare(b.firstName));

  sortedPresent.forEach(p => {
    const t = playerTotals[p.id];
    html += `<div class="psc">
      <div class="psc-header"><span class="psc-name">${p.name}</span></div>
      <div class="psc-stats">
        <div class="psc-stat"><div class="psc-stat-num stat-gk">${t.gk}</div><div class="psc-stat-label">🧤 GK</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-fwd">${t.fwd}</div><div class="psc-stat-label">⚡ Fwd</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-def">${t.def}</div><div class="psc-stat-label">🛡 Def</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-out">${t.subs}</div><div class="psc-stat-label">🔄 Subs</div></div>
      </div>
      <div class="psc-segs">`;
    segMap[p.id].forEach((s,i) => {
      html += `<div class="seg ${segCls[s]}">${segTxt[s]}<span>${segLabels[i]}</span></div>`;
    });
    html += `</div></div>`;
  });

  if (absent.length) {
    html += `<div style="margin-top:14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--muted)">Absent</div>`;
    const sortedAbsent = [...absent].sort((a,b) => a.firstName.localeCompare(b.firstName));
    sortedAbsent.forEach(p => {
      html += `<div class="psc" style="opacity:.4"><div class="psc-header"><span class="psc-name">${p.name}</span><span class="psc-badge" style="background:rgba(224,64,64,.08);color:var(--red);border:1px solid rgba(224,64,64,.2)">Absent</span></div></div>`;
    });
  }
  return html;
}

function buildSeasonSummary() {
  const stats = loadStats();
  if (!stats.games.length) {
    return `<p style="color:var(--muted);font-size:.82rem;margin-bottom:12px">No games saved yet. Play a game and tap "Save Game" in the This Game tab.</p>`;
  }

  const totals = {};
  PLAYERS.forEach(p => totals[p.id] = {gk:0,fwd:0,def:0,subs:0,games:0});
  stats.games.forEach(g => {
    Object.entries(g.players).forEach(([pid,s]) => {
      if (totals[pid]) {
        totals[pid].gk   += s.gk  ||0;
        totals[pid].fwd  += s.fwd ||0;
        totals[pid].def  += s.def ||0;
        totals[pid].subs += s.subs||0;
        totals[pid].games++;
      }
    });
  });

  let html = `<p style="font-size:.75rem;color:var(--muted);margin-bottom:12px">${stats.games.length} game${stats.games.length!==1?'s':''} recorded</p>`;
  PLAYERS.forEach(p => {
    const t = totals[p.id];
    if (!t.games) return;
    html += `<div class="psc">
      <div class="psc-header">
        <span class="psc-name">${p.name}</span>
        <span class="psc-badge" style="background:rgba(26,122,60,.08);color:var(--green);border:1px solid rgba(26,122,60,.2)">${t.games} game${t.games!==1?'s':''}</span>
      </div>
      <div class="psc-stats">
        <div class="psc-stat"><div class="psc-stat-num stat-gk">${t.gk}</div><div class="psc-stat-label">🧤 GK qtrs</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-fwd">${t.fwd}</div><div class="psc-stat-label">⚡ Fwd qtrs</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-def">${t.def}</div><div class="psc-stat-label">🛡 Def qtrs</div></div>
        <div class="psc-stat"><div class="psc-stat-num stat-out">${t.subs}</div><div class="psc-stat-label">🔄 Subs</div></div>
      </div>
    </div>`;
  });

  html += `<div style="margin-top:16px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">Game History</div>`;
  stats.games.forEach(g => {
    const names = (g.presentIds||[]).map(pid => { const p=PLAYERS.find(x=>x.id===pid); return p?p.firstName:pid; }).join(', ');
    html += `<div class="game-hist-item">
      <div class="game-hist-date">${g.dateFormatted || g.date}</div>
      <div class="game-hist-players">${names||'—'}</div>
    </div>`;
  });

  html += `<button class="clear-history-btn" onclick="clearHistory()">🗑 Clear Season Stats</button>`;
  return html;
}

// ═══════════════════════════════════════════
//  INTERACTION HELPERS
// ═══════════════════════════════════════════
function switchTab(idx) {
  document.querySelectorAll('.qtab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.quarter-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

function toggleSwap(row, qn) {
  row.classList.toggle('swap-done');
  updateProgress(qn);
  if (row.classList.contains('swap-done')) {
    showToast(`✓ ${row.querySelector('.swap-in').textContent.replace('↑ ','')} subbed in`);
  }
}

function updateProgress(qn) {
  const panel = document.getElementById(`panel-${qn-1}`);
  if (!panel) return;
  const all  = panel.querySelectorAll('.sub-swap');
  const done = panel.querySelectorAll('.sub-swap.swap-done');
  const pct = all.length ? Math.round(done.length/all.length*100) : 0;
  const t = document.getElementById(`q${qn}-prog-text`);
  const f = document.getElementById(`q${qn}-prog-fill`);
  if (t) t.textContent = all.length ? `${done.length} / ${all.length} subs confirmed` : 'No subs this quarter';
  if (f) f.style.width = pct+'%';
}

function resetPanel(panelId, qn) {
  const panel = document.getElementById(panelId);
  panel.querySelectorAll('.sub-swap').forEach(s=>s.classList.remove('swap-done'));
  panel.querySelectorAll('.half-section').forEach(h=>h.classList.remove('completed'));
  const doneBtn = document.getElementById(`qdone-${qn}`);
  if (doneBtn) { doneBtn.classList.remove('done'); doneBtn.textContent = `✓ Q${qn} Done`; }
  const idx = [...document.querySelectorAll('.quarter-panel')].indexOf(panel);
  if (idx>=0&&idx<4) document.querySelectorAll('.qtab')[idx].classList.remove('completed');
  updateProgress(qn);
  showToast('Quarter reset');
}

function editAttendance() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-attendance').classList.add('active');
  document.getElementById('header-sub').textContent = 'Mark attendance to begin';
  gameData = null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2400);
}

// INIT
document.getElementById('game-date').value = getTodayStr();
renderAttendance();
</script>
